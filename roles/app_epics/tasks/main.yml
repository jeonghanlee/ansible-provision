---
# roles/app_epics/tasks/main.yml
- name: Clone EPICS-env-distribution (binary, depth 1)
  ansible.builtin.raw: |
    if [ ! -d {{ path_epics_local }} ]; then
      git clone --depth 1 {{ repo_epics }} {{ path_epics_local }}
      printf '%s %s %s %s\n' app_epics {{ repo_epics }} "$(git -C {{ path_epics_local }} rev-parse HEAD)" "$(date -u +%FT%TZ)" >> /etc/iocrunner-bake.manifest
    fi
  changed_when: false

- name: Deploy EPICS environment activation script
  ansible.builtin.raw: |
    set -e
    env_script="{{ path_epics_local }}/{{ epics_env_version }}/{{ epics_os_dir }}/{{ epics_base_version }}/setEpicsEnv.bash"
    test -f "${env_script}"
    cat > /etc/profile.d/epics-env.sh << 'EOF'
    source {{ path_epics_local }}/{{ epics_env_version }}/{{ epics_os_dir }}/{{ epics_base_version }}/setEpicsEnv.bash
    EOF
    chmod 0644 /etc/profile.d/epics-env.sh
  changed_when: false
