---
# roles/app_ioc_runner/tasks/main.yml
- name: Deploy epics-ioc-runner infrastructure
  ansible.builtin.raw: |
    if [ ! -f {{ path_ioc_runner_bin }} ]; then
      rm -rf {{ path_ioc_runner_src }}
      git clone {{ repo_ioc_runner }} {{ path_ioc_runner_src }}
      bash {{ path_ioc_runner_src }}/bin/setup-system-infra.bash --full
      rm -rf {{ path_ioc_runner_src }}
    fi
  changed_when: false

- name: Create shared IOC deployment directory
  ansible.builtin.raw: |
    mkdir -p /opt/epics-iocs
    chown root:ioc /opt/epics-iocs
    chmod 2775 /opt/epics-iocs
  changed_when: false

- name: Add engineers to ioc group
  ansible.builtin.raw: "usermod -aG ioc {{ item }}"
  loop: "{{ epics_ioc_engineers }}"
  changed_when: false
