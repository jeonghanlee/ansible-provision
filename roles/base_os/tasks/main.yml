---
# roles/base_os/tasks/main.yml
- name: Detect OS family
  ansible.builtin.raw: |
    if [ -f /etc/redhat-release ]; then printf "RedHat\n"; elif [ -f /etc/debian_version ]; then printf "Debian\n"; fi
  register: os_family
  changed_when: false
  check_mode: false

- name: Include RedHat tasks
  ansible.builtin.include_tasks: redhat.yml
  when: "'RedHat' in os_family.stdout"

- name: Include Debian tasks
  ansible.builtin.include_tasks: debian.yml
  when: "'Debian' in os_family.stdout"

- name: Ensure includedir is the final active directive in /etc/sudoers
  ansible.builtin.raw: |
    set -e
    sudoers=/etc/sudoers
    idr_line="$(grep -nE '^[[:space:]]*[#@]includedir[[:space:]]+/etc/sudoers\.d' "$sudoers" | tail -1 | cut -d: -f1)"
    if [ -z "$idr_line" ]; then
      printf "unchanged\n"
      exit 0
    fi
    trailing="$(tail -n +"$((idr_line + 1))" "$sudoers" | grep -E '^[[:space:]]*([^#[:space:]]|[#@]include)' || true)"
    if [ -z "$trailing" ]; then
      printf "unchanged\n"
      exit 0
    fi
    idr_text="$(sed -n "${idr_line}p" "$sudoers")"
    # Same-filesystem temp file so the final mv is an atomic rename(2):
    # /etc/sudoers is never truncated or absent, even on interruption.
    tmp="$(mktemp /etc/sudoers.XXXXXX)"
    grep -vE '^[[:space:]]*[#@]includedir[[:space:]]+/etc/sudoers\.d' "$sudoers" > "$tmp"
    printf '%s\n' "$idr_text" >> "$tmp"
    if visudo -cf "$tmp" >/dev/null 2>&1; then
      chmod 0440 "$tmp"
      chown root:root "$tmp"
      mv -f "$tmp" "$sudoers"
      printf "changed\n"
    else
      rm -f "$tmp"
      printf "visudo validation failed; /etc/sudoers left untouched\n" >&2
      exit 1
    fi
  register: sudoers_includedir
  changed_when: "sudoers_includedir.stdout | trim == 'changed'"

- name: Deploy chrony configuration
  ansible.builtin.raw: |
    set -e
    target="/etc/chrony.conf"
    if [ -d /etc/chrony ]; then
      target="/etc/chrony/chrony.conf"
    fi
    tmp="$(mktemp)"
    cat > "$tmp" << 'CHRONYEOF'
    {% for server in ntp_servers %}pool {{ server }} iburst
    {% endfor %}driftfile /var/lib/chrony/drift
    makestep 1.0 3
    rtcsync
    logdir /var/log/chrony
    CHRONYEOF
    if [ -f "$target" ] && cmp -s "$tmp" "$target"; then
      rm -f "$tmp"
      printf "unchanged\n"
    else
      install -m 0644 "$tmp" "$target"
      rm -f "$tmp"
      printf "changed\n"
    fi
  register: chrony_config
  changed_when: "chrony_config.stdout | trim == 'changed'"
  notify: Restart chronyd

- name: Enable and start chronyd
  ansible.builtin.raw: systemctl enable chronyd 2>/dev/null || true; systemctl start chronyd
  changed_when: false
