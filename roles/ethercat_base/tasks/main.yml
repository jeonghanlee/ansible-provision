---
# roles/ethercat_base/tasks/main.yml
#
# Provisions the EtherCAT/RT base image layer: build toolchain, running-kernel
# headers, dkms, and the PREEMPT_RT kernel + headers. The RT kernel is INSTALLED
# but never selected as the boot default here (ethercat-env decision D2); the
# live app_ethercat run sets the boot default and confirms it post-reboot (M16).
# Applied at bake time by playbooks/05_ethercat_base.yml.

- name: Update apt cache
  ansible.builtin.raw: apt-get update -y
  changed_when: false

- name: Install EtherCAT build toolchain and module prerequisites
  ansible.builtin.raw: "apt-get install -y {{ ethercat_base_packages | join(' ') }}"
  changed_when: false

- name: Install kernel headers for the running kernel
  ansible.builtin.raw: "apt-get install -y linux-headers-$(uname -r)"
  changed_when: false

- name: Install PREEMPT_RT kernel and headers, keeping the stock kernel as boot default
  ansible.builtin.raw: |
    set -e
    grubfile=/etc/default/grub
    grubcfg=/boot/grub/grub.cfg
    stock="$(uname -r)"
    apt-get install -y {{ ethercat_rt_kernel_pkg }} {{ ethercat_rt_headers_pkg }}
    rt="$(ls /boot/vmlinuz-*rt-amd64* 2>/dev/null || true)"
    if [ -z "$rt" ]; then
      printf "ethercat_base: FAIL - no RT kernel under /boot after install\n" >&2
      exit 1
    fi
    printf "ethercat_base: RT kernel present: %s\n" "$rt"
    # Keep booting the stock kernel by default so the live app_ethercat
    # pre-reboot build runs on the stock kernel (stock-first). This does NOT
    # force RT as the default (D2); app_ethercat selects RT before its reboot.
    # The grub.cfg parse is best-effort and may need tuning on first real run.
    if grep -q '^GRUB_DEFAULT=' "$grubfile"; then
      sed -i 's/^GRUB_DEFAULT=.*/GRUB_DEFAULT=saved/' "$grubfile"
    else
      printf 'GRUB_DEFAULT=saved\n' >> "$grubfile"
    fi
    update-grub
    sub="$(awk -F\' '/^submenu /{print $2; exit}' "$grubcfg")"
    entry="$(awk -F\' -v v="$stock" '/menuentry / && index($0, v) && $0 !~ /recovery/ {print $2; exit}' "$grubcfg")"
    if [ -n "$sub" ] && [ -n "$entry" ]; then
      grub-set-default "$sub>$entry"
      printf 'ethercat_base: stock kernel kept as boot default: %s\n' "$entry"
    elif [ -n "$entry" ]; then
      grub-set-default "$entry"
      printf 'ethercat_base: stock kernel kept as boot default: %s\n' "$entry"
    else
      printf 'WARN: could not resolve stock menuentry; GRUB default left as-is\n'
    fi
  changed_when: false
