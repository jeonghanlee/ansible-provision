---
# roles/test_users/defaults/main.yml
# Multi-user test fixture accounts for the epics-ioc-runner docs/testplan.md
# scenarios.
# Intended for the iocrunner golden bake (activation pending — see
# docs/test_users_handoff.md); never imported by site.yml. Until the
# bake step lands, accounts are provisioned per run on the booted golden.

# Operators: joined to the product ioc group, so the sudoers NOPASSWD
# systemctl gate applies (full IOC lifecycle in system mode).
test_users_operators: [opa, opb]

# Observer: deliberately outside ioc; the negative control where every
# state-changing call must fail at the sudo gate.
test_users_observer: obs

# Local-mode users: ordinary logins, no ioc, no sudo. Linger is enabled
# so systemctl --user runs without an interactive session.
test_users_local: [usera, userb]

# Product group the operators join (created by app_ioc_runner / setup).
test_users_ioc_group: ioc
