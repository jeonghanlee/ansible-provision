# Transient EtherCAT/RT bake build host (pinned debian13-rtbase release base).
# Created and destroyed by cloud-provision's bake_ethercat_image.bash; the
# 05_ethercat_base.yml prerequisite layer is applied here before flattening.
[ethercat_build]
testbed-debian13-rtbase-server  ansible_host=192.168.122.80  ansible_user=vmadmin

# EPICS-env from-source build hosts, provisioned by cloud-provision's
# epics-env-* OS types. The epics_env_build role builds EPICS-env from source
# on the plain base image; group variables live on the epics_env_build parent
# and inherit into both children.
#
# core   — the internal (ALS GitLab) distribution targets; every internal-
#          branch run limits to this group.
# matrix — the additional public (GitHub) distribution targets; public-branch
#          runs limit to epics_env_build and cover all four.
[epics_env_core]
testbed-epics-env-rocky8-server    ansible_host=192.168.122.120  ansible_user=vmadmin
testbed-epics-env-debian13-server  ansible_host=192.168.122.20   ansible_user=vmadmin

